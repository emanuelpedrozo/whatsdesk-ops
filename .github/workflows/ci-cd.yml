name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: crm_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d crm_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crm_ci?schema=public
      NODE_ENV: test
      JWT_SECRET: ci-secret
      WHATSAPP_PROVIDER: mock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate -w @crm/api

      - name: Run Prisma migrations
        run: npm run prisma:migrate -w @crm/api

      - name: Sync schema to CI database
        run: npm exec -w @crm/api prisma db push --accept-data-loss

      - name: Build API
        run: npm run build -w @crm/api

      - name: Build Web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api
          NEXT_PUBLIC_RT_URL: http://localhost:3001/realtime
          NEXT_BASE_PATH: ""
        run: npm run build -w @crm/web

      - name: Run API tests
        run: npm run test -w @crm/api

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_HOST}" ] || [ -z "${SSH_USER}" ] || [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "Missing SSH secrets. Configure SSH_HOST, SSH_USER and SSH_PRIVATE_KEY."
            exit 1
          fi

          PORT="${SSH_PORT:-22}"

          # Criar diretório SSH
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Escrever chave SSH preservando quebras de linha
          # Usar echo sem aspas para preservar quebras de linha do secret
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Validar tamanho da chave
          KEY_SIZE=$(wc -c < ~/.ssh/id_rsa | tr -d ' ')
          if [ "${KEY_SIZE}" -lt 100 ]; then
            echo "Erro: SSH_PRIVATE_KEY parece estar vazia ou truncada (tamanho: ${KEY_SIZE} bytes)"
            exit 1
          fi

          # Verificar formato da chave
          if ! head -1 ~/.ssh/id_rsa | grep -qE "^(-----BEGIN (RSA |OPENSSH )?PRIVATE KEY-----|-----BEGIN EC PRIVATE KEY-----)"; then
            echo "Aviso: Formato da chave SSH pode estar incorreto"
            echo "Primeira linha da chave: $(head -1 ~/.ssh/id_rsa)"
          fi

          # Adicionar host ao known_hosts
          ssh-keyscan -p "${PORT}" -H "${SSH_HOST}" 2>/dev/null >> ~/.ssh/known_hosts || true
          chmod 644 ~/.ssh/known_hosts

          # Testar conexão SSH
          echo "Testando conexão SSH..."
          if ! ssh -o BatchMode=yes -o ConnectTimeout=5 -o IdentitiesOnly=yes -i ~/.ssh/id_rsa -p "${PORT}" "${SSH_USER}@${SSH_HOST}" "echo 'Conexão SSH OK'" 2>&1; then
            echo "Erro: Falha ao conectar via SSH. Verifique:"
            echo "1. A chave SSH está correta e completa no secret SSH_PRIVATE_KEY"
            echo "2. A chave pública correspondente está no servidor (~/.ssh/authorized_keys)"
            echo "3. SSH_HOST e SSH_USER estão corretos"
            exit 1
          fi

      - name: Deploy via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail

          PORT="${SSH_PORT:-22}"
          TARGET_PATH="${DEPLOY_PATH:-/opt/whatsdesk-ops}"

          ssh -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -p "${PORT}" "${SSH_USER}@${SSH_HOST}" env TARGET_PATH="${TARGET_PATH}" bash <<'DEPLOY_SCRIPT'
          set -eu
          cd "${TARGET_PATH}"

          echo "=== Iniciando deploy ==="
          echo "Diretório: $(pwd)"
          echo "Branch atual: $(git branch --show-current)"

          # Verificar se há mudanças locais
          if [ -n "$(git status --porcelain)" ]; then
            echo "Mudanças locais detectadas. Criando stash automático..."
            git stash push --include-untracked -m "gha-autostash-$(date +%s)"
          fi

          # Atualizar código
          echo "Atualizando código do repositório..."
          git fetch origin main
          git checkout main
          git pull --ff-only origin main || {
            echo "Erro: Não foi possível fazer pull. Verifique se há conflitos."
            exit 1
          }

          # Instalar dependências
          echo "Instalando dependências..."
          npm ci

          # Gerar Prisma client
          echo "Gerando Prisma client..."
          npm run prisma:generate -w @crm/api

          # Build
          echo "Fazendo build da API..."
          npm run build -w @crm/api

          echo "Fazendo build do Web..."
          npm run build -w @crm/web

          # Migrations
          echo "Executando migrations..."
          npm run prisma:migrate -w @crm/api

          # Restart PM2
          echo "Reiniciando processos PM2..."
          pm2 restart whatsdesk-api --update-env || pm2 start "npm run start -w @crm/api" --name whatsdesk-api
          pm2 restart whatsdesk-web --update-env || pm2 start "npm run start -w @crm/web" --name whatsdesk-web
          pm2 save

          echo "=== Deploy concluído com sucesso ==="
DEPLOY_SCRIPT
